<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #scores {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .score-box .value {
      font-size: 2rem;
      font-weight: 900;
    }

    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.draw .value { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box x">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const scoreX  = document.getElementById('score-x');
    const scoreO  = document.getElementById('score-o');
    const scoreDr = document.getElementById('score-draw');

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin(b, p) {
      return WINS.find(combo => combo.every(i => b[i] === p)) || null;
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      const cell = cells[i];
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winning = checkWin(board, current);
      if (winning) {
        winning.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        over = true;
        return;
      }

      if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }

    function updateScores() {
      scoreX.textContent  = scores.X;
      scoreO.textContent  = scores.O;
      scoreDr.textContent = scores.draw;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
